<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Sagamore mark: upward momentum peak with three ascending bars -->
  <defs>
    <linearGradient id="sg" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1458C2"/>
      <stop offset="100%" stop-color="#1B6FEE"/>
    </linearGradient>
  </defs>
  <!-- Rounded square base -->
  <rect width="32" height="32" rx="7" fill="url(#sg)"/>
  <!-- Three ascending bars — growth/momentum -->
  <rect x="6" y="18" width="5" height="8" rx="1.5" fill="#00C9A7"/>
  <rect x="13.5" y="13" width="5" height="13" rx="1.5" fill="#ffffff" opacity="0.95"/>
  <rect x="21" y="7" width="5" height="19" rx="1.5" fill="#00C9A7"/>
</svg>
